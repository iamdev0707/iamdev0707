<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #A855F7; stroke-width: 0.3; opacity: 0.15; }
      .node { fill: #A855F7; opacity: 0; }
      .pulse { fill: none; stroke: #A855F7; stroke-width: 1; opacity: 0; }
      .title { font-family: 'Fira Code', monospace; font-weight: 700; font-size: 38px; fill: #ffffff; letter-spacing: 2px; }
      .subtitle { font-family: 'Fira Code', monospace; font-weight: 400; font-size: 14px; fill: #A855F7; letter-spacing: 3px; }
      .tag { font-family: 'Fira Code', monospace; font-size: 11px; fill: #c084fc; }
      .line-h { stroke: #A855F7; stroke-width: 1; opacity: 0.4; }
      .dot { fill: #A855F7; }
      .circuit { stroke: #A855F7; stroke-width: 0.8; fill: none; opacity: 0.3; }
      .glow { fill: #A855F7; filter: url(#glow-filter); }

      /* Animations */
      .fade-in-title { animation: fadeUp 1s ease forwards 0.3s; opacity: 0; }
      .fade-in-sub { animation: fadeUp 1s ease forwards 0.8s; opacity: 0; }
      .fade-in-tags { animation: fadeUp 1s ease forwards 1.2s; opacity: 0; }
      .fade-in-line { animation: expandLine 1s ease forwards 0.5s; opacity: 0; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes expandLine {
        from { opacity: 0; transform: scaleX(0); }
        to { opacity: 0.5; transform: scaleX(1); }
      }
      @keyframes pulse-node {
        0%, 100% { opacity: 0.2; r: 3; }
        50% { opacity: 1; r: 5; }
      }
      @keyframes flow {
        0% { stroke-dashoffset: 100; opacity: 0.1; }
        50% { opacity: 0.5; }
        100% { stroke-dashoffset: 0; opacity: 0.1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes shimmer {
        0% { stop-color: #A855F7; }
        50% { stop-color: #c084fc; }
        100% { stop-color: #A855F7; }
      }

      .n1 { animation: pulse-node 2s ease-in-out infinite 0s; }
      .n2 { animation: pulse-node 2s ease-in-out infinite 0.4s; }
      .n3 { animation: pulse-node 2s ease-in-out infinite 0.8s; }
      .n4 { animation: pulse-node 2s ease-in-out infinite 1.2s; }
      .n5 { animation: pulse-node 2s ease-in-out infinite 1.6s; }
      .n6 { animation: pulse-node 2s ease-in-out infinite 0.2s; }
      .n7 { animation: pulse-node 2s ease-in-out infinite 0.6s; }
      .n8 { animation: pulse-node 2s ease-in-out infinite 1.0s; }

      .c1 { stroke-dasharray: 100; animation: flow 3s linear infinite 0s; }
      .c2 { stroke-dasharray: 100; animation: flow 3s linear infinite 0.5s; }
      .c3 { stroke-dasharray: 100; animation: flow 3s linear infinite 1s; }
      .c4 { stroke-dasharray: 100; animation: flow 3s linear infinite 1.5s; }

      .cursor { animation: blink 1s step-end infinite; }
    </style>
    <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e9d5ff"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg" rx="12"/>

  <!-- Grid lines vertical -->
  <line x1="100" y1="0" x2="100" y2="280" class="grid-line"/>
  <line x1="200" y1="0" x2="200" y2="280" class="grid-line"/>
  <line x1="300" y1="0" x2="300" y2="280" class="grid-line"/>
  <line x1="400" y1="0" x2="400" y2="280" class="grid-line"/>
  <line x1="500" y1="0" x2="500" y2="280" class="grid-line"/>
  <line x1="600" y1="0" x2="600" y2="280" class="grid-line"/>
  <line x1="700" y1="0" x2="700" y2="280" class="grid-line"/>
  <line x1="800" y1="0" x2="800" y2="280" class="grid-line"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="70" x2="900" y2="70" class="grid-line"/>
  <line x1="0" y1="140" x2="900" y2="140" class="grid-line"/>
  <line x1="0" y1="210" x2="900" y2="210" class="grid-line"/>

  <!-- Circuit paths (left side) -->
  <path d="M 30 40 L 30 80 L 70 80" class="circuit c1"/>
  <path d="M 50 140 L 50 180 L 80 180 L 80 210" class="circuit c2"/>
  <path d="M 20 200 L 20 240 L 60 240" class="circuit c3"/>

  <!-- Circuit paths (right side) -->
  <path d="M 870 40 L 870 80 L 830 80" class="circuit c2"/>
  <path d="M 850 140 L 850 180 L 820 180 L 820 210" class="circuit c1"/>
  <path d="M 880 200 L 880 240 L 840 240" class="circuit c4"/>

  <!-- Animated nodes (left) -->
  <circle cx="30" cy="40" r="3" fill="#A855F7" class="n1"/>
  <circle cx="70" cy="80" r="3" fill="#A855F7" class="n2"/>
  <circle cx="50" cy="140" r="3" fill="#A855F7" class="n3"/>
  <circle cx="80" cy="210" r="3" fill="#A855F7" class="n4"/>
  <circle cx="20" cy="200" r="3" fill="#A855F7" class="n5"/>

  <!-- Animated nodes (right) -->
  <circle cx="870" cy="40" r="3" fill="#A855F7" class="n6"/>
  <circle cx="830" cy="80" r="3" fill="#A855F7" class="n7"/>
  <circle cx="850" cy="140" r="3" fill="#A855F7" class="n8"/>
  <circle cx="820" cy="210" r="3" fill="#A855F7" class="n1"/>
  <circle cx="880" cy="200" r="3" fill="#A855F7" class="n3"/>

  <!-- Top accent line -->
  <line x1="200" y1="52" x2="700" y2="52" class="line-h fade-in-line" style="transform-origin: center;"/>

  <!-- Main title -->
  <text x="450" y="130" text-anchor="middle" class="fade-in-title" style="font-family:'Fira Code',monospace; font-weight:700; font-size:40px; fill:url(#title-grad); letter-spacing:3px;">
    DEV CHINIWALA
  </text>

  <!-- Subtitle -->
  <text x="450" y="165" text-anchor="middle" class="subtitle fade-in-sub">
    AI ENGINEER  ·  UI/UX DESIGNER  ·  RESEARCH ANALYST
  </text>

  <!-- Bottom tag line -->
  <text x="450" y="205" text-anchor="middle" class="tag fade-in-tags" style="fill:#6b7280;">
    &lt; Building systems that give real value /&gt;
    <tspan class="cursor" style="fill:#A855F7;">_</tspan>
  </text>

  <!-- Bottom accent line -->
  <line x1="200" y1="225" x2="700" y2="225" class="line-h fade-in-line" style="transform-origin: center;"/>

  <!-- Corner decorations -->
  <rect x="14" y="14" width="20" height="2" fill="#A855F7" opacity="0.6"/>
  <rect x="14" y="14" width="2" height="20" fill="#A855F7" opacity="0.6"/>

  <rect x="866" y="14" width="20" height="2" fill="#A855F7" opacity="0.6"/>
  <rect x="884" y="14" width="2" height="20" fill="#A855F7" opacity="0.6"/>

  <rect x="14" y="264" width="20" height="2" fill="#A855F7" opacity="0.6"/>
  <rect x="14" y="246" width="2" height="20" fill="#A855F7" opacity="0.6"/>

  <rect x="866" y="264" width="20" height="2" fill="#A855F7" opacity="0.6"/>
  <rect x="884" y="246" width="2" height="20" fill="#A855F7" opacity="0.6"/>
</svg>

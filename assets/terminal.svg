<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes typewriter1 {
      0%, 10% { opacity: 0; }
      11%, 100% { opacity: 1; }
    }
    @keyframes typewriter2 {
      0%, 25% { opacity: 0; }
      26%, 100% { opacity: 1; }
    }
    @keyframes typewriter3 {
      0%, 40% { opacity: 0; }
      41%, 100% { opacity: 1; }
    }
    @keyframes typewriter4 {
      0%, 55% { opacity: 0; }
      56%, 100% { opacity: 1; }
    }
    @keyframes typewriter5 {
      0%, 70% { opacity: 0; }
      71%, 100% { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes borderPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .line1 { animation: typewriter1 4s forwards; }
    .line2 { animation: typewriter2 4s forwards; }
    .line3 { animation: typewriter3 4s forwards; }
    .line4 { animation: typewriter4 4s forwards; }
    .line5 { animation: typewriter5 4s forwards; }
    .cursor { animation: blink 1s step-end infinite; }
    .border-anim { animation: borderPulse 3s ease-in-out infinite; }
  </style>
  
  <rect width="900" height="180" fill="transparent"/>
  
  <!-- Terminal window -->
  <rect x="50" y="10" width="800" height="160" rx="8" fill="url(#termBg)" stroke="url(#borderGrad)" stroke-width="1" class="border-anim"/>
  
  <!-- Title bar -->
  <rect x="50" y="10" width="800" height="30" rx="8" fill="#161b22" opacity="0.8"/>
  <rect x="50" y="30" width="800" height="10" fill="#161b22" opacity="0.8"/>
  
  <!-- Traffic lights -->
  <circle cx="75" cy="25" r="5" fill="#ff5f56"/>
  <circle cx="95" cy="25" r="5" fill="#ffbd2e"/>
  <circle cx="115" cy="25" r="5" fill="#27c93f"/>
  
  <!-- Tab title -->
  <text x="450" y="29" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">
    dev@chiniwala: ~/about-me
  </text>
  
  <!-- Terminal content -->
  <g filter="url(#glow)" transform="translate(75, 60)">
    <text class="line1" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan fill="#a855f7">❯</tspan>
      <tspan fill="#6366f1"> cat</tspan>
      <tspan fill="#8b949e"> interests.json</tspan>
    </text>
    
    <text class="line2" y="24" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan fill="#8b949e">{</tspan>
      <tspan fill="#ec4899"> "building"</tspan>
      <tspan fill="#8b949e">:</tspan>
      <tspan fill="#10b981"> "LLM Agents, RAG Pipelines, GenAI Apps"</tspan>
    </text>
    
    <text class="line3" y="48" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan fill="#8b949e">  </tspan>
      <tspan fill="#ec4899">"exploring"</tspan>
      <tspan fill="#8b949e">:</tspan>
      <tspan fill="#10b981"> "VLMs, Agentic Frameworks, Prompt Eng"</tspan>
    </text>
    
    <text class="line4" y="72" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan fill="#8b949e">  </tspan>
      <tspan fill="#ec4899">"designing"</tspan>
      <tspan fill="#8b949e">:</tspan>
      <tspan fill="#10b981"> "Production-Grade UI/UX Frontends"</tspan>
      <tspan fill="#8b949e"> }</tspan>
    </text>
    
    <text class="line5" y="100" font-family="'Courier New', monospace" font-size="13" opacity="0">
      <tspan fill="#a855f7">❯</tspan>
      <tspan fill="#8b949e"> _</tspan>
      <tspan class="cursor" fill="#a855f7">▊</tspan>
    </text>
  </g>
</svg>

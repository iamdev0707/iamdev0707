<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#6366f1;#ec4899;#a855f7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#ec4899;#a855f7;#6366f1" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#a855f7;#6366f1;#ec4899" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateY(-300px); }
      100% { transform: translateY(300px); }
    }
    @keyframes slideIn {
      0% { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    @keyframes particleFloat {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-60px) translateX(20px); opacity: 0; }
    }
    .name-text {
      animation: float 3s ease-in-out infinite;
    }
    .scanline {
      animation: scanline 4s linear infinite;
    }
    .cursor-blink {
      animation: blink 1s step-end infinite;
    }
    .particle {
      animation: particleFloat 3s ease-in-out infinite;
    }
  </style>
  
  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="300" stroke="#a855f7" stroke-width="1">
      <animate attributeName="x1" values="0;900" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;900" dur="20s" repeatCount="indefinite"/>
    </line>
  </g>
  <g opacity="0.03">
    <rect x="50" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="150" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="250" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="350" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="450" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="550" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="650" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="750" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="850" y="0" width="1" height="300" fill="#a855f7"/>
    <rect x="0" y="50" width="900" height="1" fill="#a855f7"/>
    <rect x="0" y="100" width="900" height="1" fill="#a855f7"/>
    <rect x="0" y="150" width="900" height="1" fill="#a855f7"/>
    <rect x="0" y="200" width="900" height="1" fill="#a855f7"/>
    <rect x="0" y="250" width="900" height="1" fill="#a855f7"/>
  </g>
  
  <!-- Scanline effect -->
  <rect class="scanline" x="0" y="0" width="900" height="2" fill="url(#lineGrad)" opacity="0.15"/>
  
  <!-- Floating particles -->
  <circle class="particle" cx="100" cy="250" r="2" fill="#a855f7" opacity="0.6" style="animation-delay: 0s;"/>
  <circle class="particle" cx="250" cy="280" r="1.5" fill="#6366f1" opacity="0.5" style="animation-delay: 0.5s;"/>
  <circle class="particle" cx="400" cy="260" r="2.5" fill="#ec4899" opacity="0.4" style="animation-delay: 1s;"/>
  <circle class="particle" cx="600" cy="270" r="1.8" fill="#a855f7" opacity="0.6" style="animation-delay: 1.5s;"/>
  <circle class="particle" cx="750" cy="240" r="2" fill="#6366f1" opacity="0.5" style="animation-delay: 2s;"/>
  <circle class="particle" cx="820" cy="260" r="1.5" fill="#ec4899" opacity="0.4" style="animation-delay: 2.5s;"/>
  <circle class="particle" cx="180" cy="200" r="1" fill="#a855f7" opacity="0.3" style="animation-delay: 0.8s;"/>
  <circle class="particle" cx="500" cy="220" r="1.5" fill="#6366f1" opacity="0.3" style="animation-delay: 1.8s;"/>
  
  <!-- Corner decorations -->
  <g filter="url(#glow)">
    <!-- Top-left corner -->
    <path d="M 30 30 L 30 60" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 30 30 L 60 30" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Top-right corner -->
    <path d="M 870 30 L 870 60" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <path d="M 870 30 L 840 30" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <!-- Bottom-left corner -->
    <path d="M 30 270 L 30 240" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>
    <path d="M 30 270 L 60 270" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>
    <!-- Bottom-right corner -->
    <path d="M 870 270 L 870 240" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </path>
    <path d="M 870 270 L 840 270" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </path>
  </g>
  
  <!-- Status indicator -->
  <g transform="translate(350, 70)">
    <text x="100" y="0" font-family="'Courier New', monospace" font-size="11" fill="#58a6ff" text-anchor="middle" opacity="0.7">
      DevChiniwala · README · v2.0
    </text>
  </g>
  
  <!-- Main name -->
  <g class="name-text" filter="url(#glowStrong)">
    <text x="450" y="140" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="4">
      DEV CHINIWALA
    </text>
  </g>
  
  <!-- Subtitle line -->
  <line x1="250" y1="165" x2="650" y2="165" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5">
    <animate attributeName="x1" values="350;250;350" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="550;650;550" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Subtitle -->
  <text x="450" y="195" font-family="'Courier New', monospace" font-size="14" fill="#8b949e" text-anchor="middle" letter-spacing="3">
    AI ENGINEER · GENAI EXPLORER · SYSTEM BUILDER
  </text>
  
  <!-- Terminal prompt -->
  <g transform="translate(280, 235)">
    <text font-family="'Courier New', monospace" font-size="13" fill="#a855f7">
      <tspan fill="#6366f1">❯</tspan>
      <tspan fill="#8b949e"> building the future, one system at a time</tspan>
      <tspan class="cursor-blink" fill="#a855f7">▊</tspan>
    </text>
  </g>
  
  <!-- Decorative hex -->
  <g opacity="0.08">
    <polygon points="80,150 95,140 110,150 110,170 95,180 80,170" stroke="#a855f7" stroke-width="1" fill="none">
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="790,120 805,110 820,120 820,140 805,150 790,140" stroke="#6366f1" stroke-width="1" fill="none">
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite" begin="1s"/>
    </polygon>
  </g>
</svg>

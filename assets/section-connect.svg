<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 50" width="900" height="50">
  <defs>
    <linearGradient id="sectionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes drawLine {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    .section-line {
      stroke-dasharray: 800;
      animation: drawLine 2s ease-out forwards;
    }
  </style>
  <rect width="900" height="50" fill="transparent"/>
  <g filter="url(#glow)">
    <rect x="30" y="20" width="8" height="8" fill="#10b981" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="50" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" letter-spacing="2">
    CONNECT
  </text>
  <text x="150" y="28" font-family="'Courier New', monospace" font-size="12" fill="#10b981" opacity="0.6">
    // let's build together
  </text>
  <line class="section-line" x1="30" y1="42" x2="870" y2="42" stroke="url(#sectionGrad)" stroke-width="1" opacity="0.4"/>
</svg>

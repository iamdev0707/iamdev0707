<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#ec4899;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes wave1 {
      0% { d: path("M0,40 C150,20 300,60 450,40 C600,20 750,60 900,40 L900,120 L0,120 Z"); }
      50% { d: path("M0,50 C150,60 300,20 450,50 C600,60 750,20 900,50 L900,120 L0,120 Z"); }
      100% { d: path("M0,40 C150,20 300,60 450,40 C600,20 750,60 900,40 L900,120 L0,120 Z"); }
    }
    @keyframes wave2 {
      0% { d: path("M0,60 C150,40 300,80 450,60 C600,40 750,80 900,60 L900,120 L0,120 Z"); }
      50% { d: path("M0,70 C150,80 300,40 450,70 C600,80 750,40 900,70 L900,120 L0,120 Z"); }
      100% { d: path("M0,60 C150,40 300,80 450,60 C600,40 750,80 900,60 L900,120 L0,120 Z"); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
  
  <rect width="900" height="120" fill="transparent"/>
  
  <!-- Wave layers -->
  <path d="M0,60 C150,40 300,80 450,60 C600,40 750,80 900,60 L900,120 L0,120 Z" fill="url(#waveGrad2)" opacity="0.5">
    <animate attributeName="d" 
      values="M0,60 C150,40 300,80 450,60 C600,40 750,80 900,60 L900,120 L0,120 Z;
              M0,70 C150,80 300,40 450,70 C600,80 750,40 900,70 L900,120 L0,120 Z;
              M0,60 C150,40 300,80 450,60 C600,40 750,80 900,60 L900,120 L0,120 Z" 
      dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M0,40 C150,20 300,60 450,40 C600,20 750,60 900,40 L900,120 L0,120 Z" fill="url(#waveGrad1)" opacity="0.3">
    <animate attributeName="d" 
      values="M0,40 C150,20 300,60 450,40 C600,20 750,60 900,40 L900,120 L0,120 Z;
              M0,50 C150,60 300,20 450,50 C600,60 750,20 900,50 L900,120 L0,120 Z;
              M0,40 C150,20 300,60 450,40 C600,20 750,60 900,40 L900,120 L0,120 Z" 
      dur="4s" repeatCount="indefinite"/>
  </path>
  
  <!-- Footer line -->
  <line x1="200" y1="25" x2="700" y2="25" stroke="url(#footerGrad)" stroke-width="1" opacity="0.6"/>
  
  <!-- Footer text -->
  <g filter="url(#glow)">
    <text x="450" y="20" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle" opacity="0.7">
      <tspan fill="#a855f7">⟨</tspan> crafted with <tspan fill="#ec4899">♥</tspan> by Dev Chiniwala <tspan fill="#a855f7">⟩</tspan>
    </text>
  </g>
  
  <!-- Status dots -->
  <circle cx="415" cy="105" r="3" fill="#a855f7" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="435" cy="105" r="3" fill="#6366f1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="455" cy="105" r="3" fill="#ec4899" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="475" cy="105" r="3" fill="#06b6d4" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle cx="495" cy="105" r="3" fill="#10b981" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
</svg>
